<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRB_LB Builder</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-toolbar">
      <div class="brand-wrap">
        <img src="BRB_LB_builder/assets/logo_brb.png" alt="BRB LB" class="logo" onerror="this.style.display='none'" />
        <h1>BRB_LB Builder</h1>
      </div>
      <div class="toolbar-actions">
        <button id="newProjectBtn">New Project</button>
      </div>
    </header>

    <aside class="left-sidebar">
      <h2>Project</h2>
      <p><strong>Name:</strong> <span id="projectNameValue">Not set</span></p>
      <p><strong>X:</strong> <span id="xLabelsValue">-</span></p>
      <p><strong>Y:</strong> <span id="yLabelsValue">-</span></p>
    </aside>

    <main class="central-canvas">
      <div class="empty-state" id="emptyState">Create a project to render the grid.</div>
      <div id="gridContainer"></div>
    </main>

    <aside class="right-properties-panel" id="propertiesPanel">
      <h2>Properties</h2>
      <div id="propertiesEmpty">Click a grid intersection to configure a column.</div>
      <form id="columnForm" class="hidden">
        <p><strong>Grid Point:</strong> <span id="selectedLocation"></span></p>
        <label>Mark <input id="colMark" required /></label>
        <label>Size <input id="colSize" required placeholder="W14x120" /></label>
        <label>Base Level <input id="colBaseLevel" required placeholder="Level 1" /></label>
        <label>Top Level <input id="colTopLevel" required placeholder="Level 2" /></label>
        <label>Notes <textarea id="colNotes" rows="3" placeholder="Optional"></textarea></label>
        <button type="submit">Save Column</button>
      </form>
    </aside>

    <section class="bottom-data-preview">
      <h2>Data Preview: Columns</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Grid Location</th>
            <th>Mark</th>
            <th>Size</th>
            <th>Base Level</th>
            <th>Top Level</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="dataTableBody">
          <tr><td colspan="7">No columns created.</td></tr>
        </tbody>
      </table>
    </section>
  </div>

  <dialog id="projectModal">
    <form id="projectForm" method="dialog">
      <h2>Project Setup</h2>
      <label>Project name <input id="projectName" type="text" required /></label>
      <label>X grid labels (CSV) <input id="xLabels" type="text" placeholder="A,B,C,D" required /></label>
      <label>Y grid labels (CSV) <input id="yLabels" type="text" placeholder="1,2,3,4" required /></label>
      <div class="modal-actions"><button type="submit">Create Grid</button></div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
